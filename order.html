<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BIORIN - Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef7f0 0%, #f8e8d8 50%, #e8d5c4 100%);
            color: #4a4a4a;
            min-height: 100vh;
            direction: rtl;
        }
        .page {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
        }
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p { color: #7a7a7a; }
        form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a4a4a;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }
        .back {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
            transition: all 0.3s ease;
        }
        .back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }
        .contact-section { text-align: center; margin-top: 20px; }
        .contact-links { opacity: 0; max-height: 0; overflow: hidden; transition: opacity 0.3s ease, max-height 0.3s ease; }
        .contact-links.show { opacity: 1; max-height: 200px; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>Order Form</h1>
            <p>Please fill in your details to place your order.</p>
            <a href="index.html" class="back">Back to Main</a>
        </header>
        <form action="mailto:alaawaleed2003.36@gmail.com" method="post" enctype="text/plain">
            <label for="product">Product:</label>
            <select id="product" name="product" required>
                <option value="">Select Product</option>
                <option value="Body Splash">Body Splash</option>
                <option value="Body Butter">Body Butter</option>
            </select>

            <label for="type">Type:</label>
            <select id="type" name="type" required>
                <option value="">Select Type</option>
                <option value="🌸 Blush Velvet | Double J’adore">🌸 Blush Velvet | Double J’adore</option>
                <option value="🍓 Rosé Berry – دوب بربري هير">🍓 Rosé Berry – دوب بربري هير</option>
                <option value="☕ Latte Bliss – دوب بيانكو لاتيه">☕ Latte Bliss – دوب بيانكو لاتيه</option>
            </select>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" required></textarea>

            <button type="submit">Send Order</button>
        </form>
        <div class="contact-section">
            <button class="btn" onclick="toggleContact()">Contact</button>
            <div class="contact-links" id="contact-links">
                <a href="https://wa.me/201140278661" class="btn">WhatsApp</a>
                <a href="mailto:alaawaleed2003.36@gmail.com" class="btn">Email</a>
            </div>
        </div>
    </div>
    <script>
        function toggleContact() {
            var el = document.getElementById('contact-links');
            el.classList.toggle('show');
        }
    </script>
</body>
</html></content>
