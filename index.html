<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIORIN - Luxury Skincare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef7f0 0%, #f8e8d8 50%, #e8d5c4 100%);
            color: #4a4a4a;
            min-height: 100vh;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 30px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { font-size: 1.1rem; color: #7a7a7a; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }
        .product-image {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            object-fit: cover;
            object-position: center;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: block;
        }
        .product-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #d4a574;
            margin-bottom: 10px;
        }
        .product-desc {
            font-size: 0.95rem;
            color: #7a7a7a;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }
        .sidebar .btn {
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }
        .contact-links { opacity: 0; max-height: 0; overflow: hidden; transition: opacity 0.3s ease, max-height 0.3s ease; }
        .contact-links.show { opacity: 1; max-height: 200px; }
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        .sidebar h2 {
            font-size: 1.5rem;
            color: #d4a574;
            margin-bottom: 20px;
            text-align: center;
        }
        .sidebar .btn { width: 100%; margin-bottom: 15px; }
        .order-form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 20px;
        }
        .order-form h3 {
            font-size: 1.3rem;
            color: #d4a574;
            margin-bottom: 15px;
            text-align: center;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #4a4a4a;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .footer p { color: #7a7a7a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <h1>BIORIN</h1>
                <p>Luxury Skincare for Radiant Beauty</p>
            </div>
            <div class="products-grid">
                <div class="product-card">
                    <img src="WhatsApp Image 2026-04-02 at 12.12.125 AM.jpeg" alt="Body Splash" class="product-image">
                    <h3 class="product-title">Body Splash</h3>
                    <p class="product-desc">Refreshing body splash with floral scents.</p>
                    <a href="BIORIN_product1.html" class="btn">Open</a>
                </div>
                <div class="product-card">
                    <img src="WhatsApp Image 1-04-02 at 121.12.15 AM.jpeg" alt="Body Butter" class="product-image">
                    <h3 class="product-title">Body Butter</h3>
                    <p class="product-desc">Nourishing body butter for soft skin.</p>
                    <a href="BIORIN_product2.html" class="btn">Open</a>
                </div>
            </div>
        </div>
        <div class="sidebar">
            <button class="btn contact-btn" onclick="toggleContact()">Contact</button>
            <div class="contact-links" id="contact-links">
                <a href="https://wa.me/201140278661" class="btn">WhatsApp</a>
                <a href="mailto:alaawaleed2003.36@gmail.com" class="btn">Email</a>
            </div>
            <div class="order-form">
                <h3>Quick Order</h3>
                <form action="mailto:alaawaleed2003.36@gmail.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label for="product">Product</label>
                        <select id="product" name="product">
                            <option value="Body Splash">Body Splash</option>
                            <option value="Body Butter">Body Butter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type">
                            <option value="Blush Velvet">Blush Velvet</option>
                            <option value="Rose Berry">Rose Berry</option>
                            <option value="Latte Bliss">Latte Bliss</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Order</button>
                </form>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 BIORIN. All rights reserved.</p>
    </div>
    <script>
        function toggleContact() {
            var el = document.getElementById('contact-links');
            el.classList.toggle('show');
        }
    </script>
</body>
</html>
