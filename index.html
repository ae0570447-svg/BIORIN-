<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIORIN - الصفحة الرئيسية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef7f0 0%, #f8e8d8 50%, #e8d5c4 100%);
            color: #4a4a4a;
            min-height: 100vh;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            color: #7a7a7a;
        }
        .btn {
            background: linear-gradient(135deg, #d4a574, #f4e1c1);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BIORIN</h1>
            <p>مرحبًا بكم في الصفحة الرئيسية لمنتجات BIORIN الفاخرة.</p>
        </div>
        <a href="BIORIN.html" class="btn">الصفحة الرئيسية للمنتجات</a>
    </div>
</body>
</html>
